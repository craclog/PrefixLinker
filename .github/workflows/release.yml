name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Chrome zip and Firefox xpi
        run: |
          zip -r PrefixLinker-${{ github.ref_name }}-chrome.zip extension/
          cp PrefixLinker-${{ github.ref_name }}-chrome.zip PrefixLinker-${{ github.ref_name }}-firefox.xpi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PrefixLinker-${{ github.ref_name }}-chrome.zip
            PrefixLinker-${{ github.ref_name }}-firefox.xpi
          generate_release_notes: true
